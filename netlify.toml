[build]
  publish = "."

# URLs amigáveis: /desentupidora-caucaia em vez de .html
[[redirects]]
  from = "/*.html"
  to   = "/:splat"
  status = 301
  force = false


[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fotos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
